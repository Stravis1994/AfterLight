<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up Afterlight</title>
</head>

<body>
    <!-- Header -->
    <header><span><img src="Assets\images\logo.png"></span>Sign Up
        <!-- Navigation -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Already A Member</a></li>
            </ul>
        </nav>
    </header>
    <!-- Main Content -->
    <main>
        <!-- Sign Up Section -->
        <section id="signUpSection">
            <h2>Create Your Account</h2>
            <!-- Sign Up Form -->
            <form id="signUpForm">
                <label for="name">First Name:</label>
                <input type="text" id="name" name="name" pattern="[A-Za-z]+" required>

                <label for="surname">Last Name:</label>
                <input type="text" id="surname" name="surname" pattern="[A-Za-z]+" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" minlength="8" required>

                <button type="submit">Sign Up Now</button>
            </form>
        </section>
    </main>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Afterlight. All rights reserved.</p>
    </footer>
    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
